apiVersion: apps/v1
kind: Deployment
metadata:
  name: myagent-frontend
  namespace: myagent
  labels:
    app: myagent
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myagent
      component: frontend
  template:
    metadata:
      labels:
        app: myagent
        component: frontend
    spec:
      containers:
        - name: frontend
          image: myagent-frontend:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://myagent-backend-svc:8000"
            - name: NEXT_PUBLIC_SSE_URL
              value: "http://myagent-backend-svc:8000/api/stream"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: myagent-frontend-svc
  namespace: myagent
  labels:
    app: myagent
    component: frontend
spec:
  type: LoadBalancer
  selector:
    app: myagent
    component: frontend
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
