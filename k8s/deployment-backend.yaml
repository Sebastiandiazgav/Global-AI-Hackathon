apiVersion: apps/v1
kind: Deployment
metadata:
  name: myagent-backend
  namespace: myagent
  labels:
    app: myagent
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myagent
      component: backend
  template:
    metadata:
      labels:
        app: myagent
        component: backend
    spec:
      containers:
        - name: backend
          image: myagent-backend:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: myagent-config
            - secretRef:
                name: myagent-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: myagent-backend-svc
  namespace: myagent
  labels:
    app: myagent
    component: backend
spec:
  type: ClusterIP
  selector:
    app: myagent
    component: backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
